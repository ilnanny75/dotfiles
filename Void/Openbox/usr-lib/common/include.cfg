# --- FUNZIONI PER GENERARE MENU OPENBOX / LABWC ---

# Inizia il menu XML
menuStart() {
    echo '    <openbox_pipe_menu>'
}

# Crea una singola voce del menu: menuItem "Etichetta" "comando"
menuItem() {
    echo "        <item label=\"$1\">"
    echo "            <action name=\"Execute\"><command>$2</command></action>"
}

# Chiude una voce del menu
menuItemEnd() {
    echo '        </item>'
}

# Crea un separatore: menuSeparator "Testo Opzionale"
menuSeparator() {
    if [[ ${1-} ]]; then
        echo "        <separator label=\"$1\" />"
    else
        echo '        <separator />'
    fi
}

# Inizia un sottomenu: menuSubmenu "ID" "Etichetta"
menuSubmenu() {
    echo "        <menu id=\"$1\" label=\"$2\">"
}

# Chiude un sottomenu o il menu principale
menuSubmenuEnd() {
    echo '        </menu>'
}

menuEnd() {
    echo '    </openbox_pipe_menu>'
}

# --- FUNZIONI DI UTILITÀ PER TERMINALE ---

# Stampa un messaggio a video (alias di echo)
say() {
    echo "$@"
}

# Chiede una conferma all'utente (S/n)
# Ritorna 0 se Sì, 1 se No
confirm() {
    local answer
    read -r -p "$1 [S/n] " answer
    case "$answer" in
        [sS][ìÌyY] | "") return 0 ;;
        *) return 1 ;;
    esac
}

# Verifica se un comando esiste nel sistema
check_cmd() {
    if ! command -v "$1" >/dev/null 2>&1; then
        echo "Errore: il comando '$1' non è installato." >&2
        return 1
    fi
    return 0
}

# Funzione per gestire gli errori e uscire
die() {
    echo -e "\e[1;31mERRORE: $1\e[0m" >&2
    exit 1
}

# Aspetta che l'utente prema INVIO prima di chiudere
pause() {
    echo -e "\nPremi INVIO per continuare..."
    read -r
}
